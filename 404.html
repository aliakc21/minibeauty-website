<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayfa Bulunamadı — Mini Beauty</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #FFF8FB 0%, #FFFFFF 100%);
      min-height: 100vh;
      display: grid; place-items: center;
      color: #1E1E23;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(135deg, #E91E63, #AD1457);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      line-height: 1;
    }
    h1 { font-size: 24px; margin: 16px 0 8px; font-weight: 500; }
    p { color: #5A5A66; margin-bottom: 24px; max-width: 400px; }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #E91E63;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 500;
    }
    a:hover { background: #AD1457; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Sayfa bulunamadı</h1>
    <p>Aradığınız sayfa mevcut değil ya da taşınmış olabilir.</p>
    <a href="/">Ana sayfaya dön</a>
  </div>
</body>
</html>
